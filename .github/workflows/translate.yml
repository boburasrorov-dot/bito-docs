name: Auto-Translate BITO Docs

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Which language to translate to'
        required: true
        default: 'ru'
        type: choice
        options:
          - ru
          - en

  push:
    branches:
      - main
    paths:
      - 'uz/**'

jobs:
  translate:
    name: Translate Uzbek → ${{ github.event.inputs.language || 'ru' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Translate pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
          TARGET_LANG: ${{ github.event.inputs.language || 'ru' }}
        run: python -u scripts/translate.py
