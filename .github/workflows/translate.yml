name: Auto-Translate BITO Docs

on:
  push:
    branches:
      - main
    paths:
      - 'uz/**'

  workflow_dispatch:
    inputs:
      translate_all:
        description: 'Translate ALL pages (not just changed ones)'
        required: false
        default: 'false'

jobs:
  translate:
    name: Translate Uzbek → Russian & English
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event.inputs.translate_all }}" = "true" ]; then
            echo "Translating ALL files..."
            echo "files=" >> $GITHUB_OUTPUT
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'uz/**')
            echo "Changed files: $FILES"
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Translate changed pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${{ steps.changed.outputs.files }}" ]; then
            python scripts/translate.py \
              --uz-dir uz \
              --out-dir . \
              --languages ru,en
          else
            python scripts/translate.py \
              --uz-dir uz \
              --out-dir . \
              --languages ru,en \
              --changed-files "${{ steps.changed.outputs.files }}"
          fi

      - name: Commit translations
        run: |
          git config --local user.email "bot@bito.uz"
          git config --local user.name "BITO Translator Bot"
          git add ru/ en/
          if git diff --staged --quiet; then
            echo "No new translations to commit."
          else
            git commit -m "Auto-translate: update RU & EN docs"
            git push
            echo "Translations pushed!"
          fi
