name: Auto-Translate BITO Docs

on:
  push:
    branches:
      - main
    paths:
      - 'uz/**'

  workflow_dispatch:
    inputs:
      translate_all:
        description: 'Translate ALL pages (not just changed ones)'
        required: false
        default: 'false'

jobs:
  translate:
    name: Translate Uzbek → Russian & English
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Translate pages (commits every 10 files)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/translate.py
