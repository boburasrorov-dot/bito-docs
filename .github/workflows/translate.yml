name: Auto-Translate BITO Docs

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Which language to translate to'
        required: true
        default: 'ru'
        type: choice
        options:
          - ru
          - en
  push:
    branches:
      - main
    paths:
      - 'uz/**'

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Translate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
          TARGET_LANG: ${{ github.event.inputs.language || 'ru' }}
        run: python -u scripts/translate.py
      - name: Save to GitHub
        run: |
          git config user.email "bot@bito.uz"
          git config user.name "BITO Translator Bot"
          git add ru/ en/
          git diff --staged --quiet || (git commit -m "Auto-translate: update docs" && git push)
